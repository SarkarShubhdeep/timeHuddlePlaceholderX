# Render Blueprint: https://render.com/docs/infrastructure-as-code
# After connecting the repo, set ROOT_URL and MONGO_URL in the dashboard
# (Blueprint prompts for sync: false vars on first apply).

services:
  - type: web
    name: timehuddle-placeholder
    runtime: docker
    region: oregon
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: BIND_IP
        value: "0.0.0.0"
      # Optional: override public URL (e.g. custom domain). If unset, scripts/render-start.sh uses RENDER_EXTERNAL_URL.
      - key: ROOT_URL
        sync: false
      - key: MONGO_URL
        sync: false
      # Optional legacy gate for GET /api/activitywork/import/latest (and for POST
      # when ACTIVITYWORK_IMPORT_POST_REQUIRES_USER_TOKEN is unset/false).
      - key: ACTIVITYWORK_IMPORT_SHARED_SECRET
        sync: false
      # When true, POST /api/activitywork/import only accepts Bearer tokens that
      # match a per-user token generated in the app (Mongo). Recommended for prod.
      - key: ACTIVITYWORK_IMPORT_POST_REQUIRES_USER_TOKEN
        sync: false
